version: '2'

services:
  redis:
    image: bitnami/redis:6.0
    container_name: cache
    environment:
      - REDIS_PASSWORD=password123
    ports:
      - '6379:6379'
  myazan:
    build: .
    environment:
      - PORT=8080
      - NODE_ENV=production
      - MONGO_URI=mongodb://root:dev@51.15.189.132:40003/core
      - REDIS_URL=redis://cache
      - REDIS_PASSWORD=password123
    ports:
      - '8080:8080'
